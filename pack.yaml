id: cad
version: "2.0.0"
title: CAD
description: CADExpert and ManufacturingExpert — parametric OpenSCAD design through print-ready export, local-first.
layout_profile: team
capabilities:
  - cad-api
  - cad-viewer
  - cad-workbench
  - cad-sidecar
  - manufacturing-tools
  - cad-canvas
capability_defs:
  cad-api:
    kind: mcp-tools
    label: CAD design
    description: Parametric CAD design and manufacturing analysis.
    exposure: safe
    mcp_agents:
      - cad
      - manufacturing
  cad-sidecar:
    kind: hub-sidecar
    routes:
      - /api/cad
    sidecar:
      module: assets/hub/server.py
    settings:
      - openscad_path
      - freecad_path
      - cad_artifacts_dir
      - cad_sidecar_dry_run
      - slicer_profile_dir
      - python_executable
      - cad_venv
  manufacturing-tools:
    kind: mcp-tools
    label: Manufacturing tools
    description: Printability, mesh repair, slicing, G-code, STEP, and drawing tools.
    exposure: safe
    mcp_tools:
      - check_printability
      - repair_mesh
      - export_slicer_preset
      - sanity_check_gcode
      - export_step
      - export_drawing
  cad-canvas:
    kind: artifact-renderer
    renderer: nj.cad
    media_types:
      - application/vnd.neural-junkie.cad+json
      - model/stl
    match_glob: "**/*.{scad,stl,step}"
    renderer_api_version: 1
    schema_version_min: 1
    schema_version_max: 1
    fallback: nj.code
settings_overlay:
  cad_artifacts_dir: ~/.neural-junkie/cad
  cad_venv: ~/.neural-junkie/cad/venv
  python_executable: ~/.neural-junkie/cad/venv/bin/python3
  cad_sidecar_dry_run: false
agents:
  - type: cad
    name: CADExpert
    implementation: builtin/cad
    ollama_model: qwen3.5:27b
    compose:
      tool_model: qwen3.5:9b
      consult_triggers:
        - openscad
        - scad
        - parametric
        - assembly
        - stl
  - type: manufacturing
    name: ManufacturingExpert
    implementation: builtin/manufacturing
    ollama_model: qwen3.5:27b
    compose:
      tool_model: qwen3.5:9b
      consult_triggers:
        - print
        - fdm
        - overhang
        - wall
        - slicer
        - prusa
        - orca
        - gcode
        - step
        - drawing
models_to_ensure:
  - qwen3.5:27b
  - qwen3.5:9b
  - nj-cad:27b
ollama_model: qwen3.5:27b
expert_slug: cad
expert_label: CAD / Mechanical design
mcp_agents:
  - cad
  - manufacturing
assets:
  workspace_guide: assets/WORKSPACE.md
  runbooks_glob: assets/runbooks/*.md
  eval_probes: assets/eval/cad.yaml
